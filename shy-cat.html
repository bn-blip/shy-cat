<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shy Cat — AMPRSND</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: 'Courier New', monospace;
  }

  #scene {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #cat {
    position: absolute;
    width: 220px;
    cursor: none;
    transform-origin: bottom center;
    transition: none;
    will-change: transform, left, top;
    user-select: none;
    pointer-events: none;
  }

  #cat img {
    width: 100%;
    display: block;
    mix-blend-mode: multiply;
  }

  #cat-sitting { display: block; }
  #cat-standing { display: none; }

  #amprsnd {
    position: fixed;
    bottom: 28px;
    left: 32px;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: #b8b8b2;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.2s ease;
    user-select: none;
  }

  #word-prompt {
    position: fixed;
    bottom: 28px;
    right: 32px;
    opacity: 0;
    transition: opacity 1.8s ease;
    pointer-events: none;
  }

  #word-prompt.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #word-prompt label {
    display: block;
    font-size: 8.5px;
    letter-spacing: 0.22em;
    color: #aaa;
    text-transform: lowercase;
    margin-bottom: 10px;
  }

  #word-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #word-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #ccc;
    outline: none;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #555;
    letter-spacing: 0.08em;
    width: 200px;
    padding: 4px 0;
    transition: border-color 0.3s ease;
  }

  #word-input:focus {
    border-bottom-color: #999;
  }

  #word-input::placeholder {
    color: #ccc;
    font-size: 10px;
    letter-spacing: 0.12em;
  }

  #word-response {
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: #bbb;
    text-transform: lowercase;
    min-height: 14px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #word-response.visible {
    opacity: 1;
  }

  #state-label {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 8px;
    letter-spacing: 0.4em;
    color: #ccc;
    text-transform: lowercase;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    user-select: none;
  }

  @media (max-width: 600px) {
    #cat { width: 160px; }
  }

  .meow {
    position: fixed;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #888;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    animation: meow-float 3.2s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes meow-float {
    0%   { opacity: 0; transform: translateY(0px); }
    15%  { opacity: 1; }
    70%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-38px); }
  }

</style>
</head>

<div id="word-prompt">
  <label id="word-label">say something to it</label>
  <div id="word-input-row">
    <input type="text" id="word-input" maxlength="32" autocomplete="off" spellcheck="false" placeholder="type something, press enter">
  </div>
  <div id="word-response"></div>
</div>

<div id="state-label" id="state-label"></div>

<script>
(function() {

  const cat = document.getElementById('cat');
  const sitting = document.getElementById('cat-sitting');
  const standing = document.getElementById('cat-standing');
  
  const wordPrompt = document.getElementById('word-prompt');
  const wordInput = document.getElementById('word-input');
  const stateLabel = document.getElementById('state-label');

  // --- State ---
  const STATE = { IDLE: 'idle', NOTICING: 'noticing', ALERT: 'alert', TRUSTING: 'trusting', AVOIDING: 'avoiding', RESETTING: 'resetting' };

  let state = STATE.IDLE;
  let catX = window.innerWidth * 0.72;
  let catY = window.innerHeight * 0.62;
  let targetX = catX;
  let targetY = catY;
  let currentX = catX;
  let currentY = catY;
  let catW = 220;
  let catH = 280;

  // Pointer
  let pX = -999, pY = -999;
  let pVX = 0, pVY = 0;
  let lastPX = -999, lastPY = -999;
  let lastPTime = Date.now();
  let speed = 0;
  let noticeTimer = null;
  let resetTimer = null;
  let trustTimer = null;
  let showLabelTimer = null;

  // Animation
  let idlePhaseTail = 0;
  let idlePhaseBreath = 0;
  let animFrame;
  let startTime = Date.now();

  // Mobile
  let isMobile = ('ontouchstart' in window);
  let tapCount = 0;
  let tapTimer = null;
  let holdTimer = null;
  let longPressing = false;

  // Scarf hue shift
  let scarfShift = 0;

  function catCenter() {
    return { x: currentX + catW/2, y: currentY + catH/2 };
  }

  function distToPointer() {
    const c = catCenter();
    return Math.sqrt((pX-c.x)**2 + (pY-c.y)**2);
  }

  // --- Pose helpers ---
  function showSitting() {
    sitting.style.display = 'block';
    standing.style.display = 'none';
  }
  function showStanding() {
    sitting.style.display = 'none';
    standing.style.display = 'block';
  }

  // --- State machine ---
  function setState(s) {
    if (state === s) return;
    state = s;
    showStateLabel(s);
  }

  function showStateLabel(s) {
    clearTimeout(showLabelTimer);
    const words = { idle: '', noticing: 'noticing', alert: 'pause', trusting: 'stay', avoiding: 'shy', resetting: 'drift' };
    const w = words[s] || '';
    if (!w) { stateLabel.style.opacity = 0; return; }
    stateLabel.textContent = w;
    stateLabel.style.opacity = 0.18;
    showLabelTimer = setTimeout(() => { stateLabel.style.opacity = 0; }, 1800);
  }

  // --- Movement ---
  function flee() {
    const c = catCenter();
    const dx = c.x - pX;
    const dy = c.y - pY;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    const nx = dx/dist, ny = dy/dist;
    const fleeD = 100 + Math.random()*80;
    let nx2 = catX + nx*fleeD + (Math.random()-0.5)*60;
    let ny2 = catY + ny*fleeD + (Math.random()-0.5)*40;
    nx2 = Math.max(30, Math.min(window.innerWidth - catW - 30, nx2));
    ny2 = Math.max(30, Math.min(window.innerHeight - catH - 30, ny2));
    moveTo(nx2, ny2, 600 + Math.random()*200);
    showStanding();
    setTimeout(() => { if(state !== STATE.AVOIDING) return; showSitting(); }, 900);
  }

  let moveAnimation = null;
  function moveTo(tx, ty, duration) {
    if (moveAnimation) cancelAnimationFrame(moveAnimation);
    const startX = currentX, startY = currentY;
    const t0 = Date.now();
    function step() {
      const elapsed = Date.now() - t0;
      const p = Math.min(elapsed/duration, 1);
      const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
      currentX = startX + (tx - startX)*ease;
      currentY = startY + (ty - startY)*ease;
      catX = currentX; catY = currentY;
      applyTransform();
      if (p < 1) moveAnimation = requestAnimationFrame(step);
      else { catX = tx; catY = ty; currentX = tx; currentY = ty; }
    }
    moveAnimation = requestAnimationFrame(step);
  }

  function applyTransform() {
    let tiltX = 0, tiltY = 0, breathY = 0, tailX = 0;
    const now = Date.now() - startTime;

    if (state === STATE.IDLE || state === STATE.RESETTING || state === STATE.NOTICING) {
      const breath = Math.sin(now*0.0004 * 2 * Math.PI / 1 + idlePhaseBreath) * 0.5;
      const tail = Math.sin(now*0.00028 * 2 * Math.PI / 1 + idlePhaseTail) * 1.2;
      breathY = breath;
      tailX = tail;
    }

    if (state === STATE.NOTICING) {
      const c = catCenter();
      const dx = pX - c.x;
      tiltX = Math.max(-4, Math.min(4, dx*0.015));
    }

    if (state === STATE.TRUSTING) {
      const c = catCenter();
      const dx = pX - c.x;
      tiltX = Math.max(-3, Math.min(3, dx*0.01));
    }

    cat.style.left = (currentX + tailX) + 'px';
    cat.style.top = (currentY + breathY) + 'px';
    cat.style.transform = `rotate(${tiltX}deg) scaleX(${pX < catCenter().x ? -1 : 1})`;
  }

  // --- Blink ---
  // --- Main update loop ---
  function update() {
    const now = Date.now() - startTime;
    idlePhaseTail = now * 0.00018;
    idlePhaseBreath = now * 0.00013;

    // Smooth position toward catX/catY (used for idle drift)
    if (state === STATE.IDLE || state === STATE.RESETTING) {
      currentX += (catX - currentX) * 0.015;
      currentY += (catY - currentY) * 0.015;
    }

    applyTransform();
    animFrame = requestAnimationFrame(update);
  }

  // --- Pointer tracking ---
  let speedSamples = [];
  function onPointerMove(e) {
    const nx = e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : pX);
    const ny = e.clientY !== undefined ? e.clientY : (e.touches ? e.touches[0].clientY : pY);
    const now = Date.now();
    const dt = Math.max(1, now - lastPTime);
    const dx = nx - lastPX;
    const dy = ny - lastPY;
    speed = Math.sqrt(dx*dx+dy*dy)/dt*16;
    pX = nx; pY = ny;
    lastPX = nx; lastPY = ny;
    lastPTime = now;
    evaluatePointer();
  }

  function evaluatePointer() {
    const dist = distToPointer();
    const FAR = 280, MEDIUM = 160, NEAR = 80;
    const SPEED_FAST = 6;

    clearTimeout(resetTimer);
    resetTimer = setTimeout(doReset, 3500);

    if (dist < NEAR) {
      if (speed > SPEED_FAST) {
        // Fast approach — flee
        clearTimeout(noticeTimer);
        clearTimeout(trustTimer);
        setState(STATE.AVOIDING);
        flee();
        resetTimer = setTimeout(doReset, 5000);
      } else {
        // Slow/steady — trust
        if (state !== STATE.TRUSTING) {
          clearTimeout(noticeTimer);
          trustTimer = setTimeout(() => {
            setState(STATE.TRUSTING);
            showSitting();
                  }, 800 + Math.random()*400);
        }
      }
    } else if (dist < MEDIUM) {
      if (state !== STATE.ALERT && state !== STATE.TRUSTING) {
        clearTimeout(noticeTimer);
        noticeTimer = setTimeout(() => {
          setState(STATE.ALERT);
          showStanding();
        }, 200 + Math.random()*80);
      }
    } else if (dist < FAR) {
      if (state === STATE.IDLE || state === STATE.RESETTING) {
        clearTimeout(noticeTimer);
        noticeTimer = setTimeout(() => {
          setState(STATE.NOTICING);
          showSitting();
        }, 180 + Math.random()*100);
      }
    }
  }

  function doReset() {
    setState(STATE.RESETTING);
    showSitting();
    clearTimeout(trustTimer);
    clearTimeout(noticeTimer);
    setTimeout(() => {
      setState(STATE.IDLE);
      // Gentle drift
      const nx = 0.35 + Math.random()*0.4;
      const ny = 0.45 + Math.random()*0.35;
      moveTo(window.innerWidth*nx - catW/2, window.innerHeight*ny - catH/2, 2500);
    }, 800);
  }

  // --- Lingering — reveal word prompt ---
  let lingerTimer = setTimeout(() => {
    wordPrompt.classList.add('visible');
  }, 22000);

  // --- Word input ---
  wordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const w = wordInput.value.trim().toLowerCase();
      if (w) reactToWord(w);
      wordInput.value = '';
    }
  });

  const wordResponse = document.getElementById('word-response');

  const meows = ['meow', 'mrrp', 'mew', 'meow.', 'mew.', 'mrrp'];
  let meowIndex = 0;

  function spawnMeow() {
    const word = meows[meowIndex % meows.length];
    meowIndex++;

    const el = document.createElement('span');
    el.className = 'meow';
    el.textContent = word;
    document.body.appendChild(el);

    // Position above the cat's head
    const catRect = cat.getBoundingClientRect();
    const x = catRect.left + catRect.width * 0.42 + (Math.random() - 0.5) * 20;
    const y = catRect.top - 10;
    el.style.left = x + 'px';
    el.style.top = y + 'px';

    // Remove after animation
    setTimeout(() => { el.remove(); }, 3400);
  }


  const wordLabel = document.getElementById('word-label');

  const warmWords = ['warm','love','soft','gentle','kind','safe','home','calm','peace','quiet','tender','light','bright','still','sweet'];
  const coolWords = ['cold','rain','night','dark','deep','vast','grey','gray','blue','hush','shadow','fog','hollow','lost','alone'];
  const shyWords = ['shy','small','hide','careful','quiet','scared','nervous','unsure','alone','fragile'];

  const responses = {
    warm: ['it stayed a little longer','something shifted','the scarf caught light','it noticed','it remembered'],
    cool: ['it looked away slowly','it found a quieter corner','somewhere distant','it understood','it waited'],
    shy: ['it felt less alone','it recognized something','it stayed very still','it looked at you'],
    neutral: ['it moved','something passed between you','it considered','it turned, then turned back','it remembered this']
  };

  function reactToWord(w) {
    // Pick response
    let category = 'neutral';
    if (warmWords.some(ww => w.includes(ww))) category = 'warm';
    else if (coolWords.some(cw => w.includes(cw))) category = 'cool';
    else if (shyWords.some(sw => w.includes(sw))) category = 'shy';

    const pool = responses[category];
    const msg = pool[Math.floor(Math.random()*pool.length)];

    // Show response
    wordResponse.textContent = '— ' + msg;
    wordResponse.classList.remove('visible');
    setTimeout(() => wordResponse.classList.add('visible'), 80);

    // Fade response after a while
    setTimeout(() => { wordResponse.classList.remove('visible'); }, 5000);

    // Meow
    setTimeout(spawnMeow, 300);

    // Gentle relocation
    const nx = 0.2 + Math.random()*0.55;
    const ny = 0.3 + Math.random()*0.5;
    moveTo(window.innerWidth*nx - catW/2, window.innerHeight*ny - catH/2, 1800);
    setState(STATE.RESETTING);
    setTimeout(() => setState(STATE.IDLE), 2000);

    // Scarf tint
    if (category === 'warm') {
      standing.style.filter = 'sepia(0.15) saturate(1.2)';
      sitting.style.filter = 'sepia(0.15) saturate(1.2)';
    } else if (category === 'cool') {
      standing.style.filter = 'hue-rotate(200deg) saturate(0.7) brightness(0.95)';
      sitting.style.filter = 'hue-rotate(200deg) saturate(0.7) brightness(0.95)';
    } else {
      standing.style.filter = '';
      sitting.style.filter = '';
    }

    // Reset filter after a while
    setTimeout(() => {
      standing.style.filter = '';
      sitting.style.filter = '';
    }, 8000);
  }

  // --- Mobile ---
  if (isMobile) {
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      pX = t.clientX; pY = t.clientY;
      const dist = distToPointer();
      const NEAR = 120;
      longPressing = false;
      holdTimer = setTimeout(() => {
        longPressing = true;
        setState(STATE.TRUSTING);
        showSitting();
          }, 650);

      if (dist < NEAR) {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => { tapCount = 0; }, 500);
        if (tapCount >= 2) {
          tapCount = 0;
          clearTimeout(holdTimer);
          setState(STATE.AVOIDING);
          flee();
        } else {
          setState(STATE.NOTICING);
        }
      }
    });

    document.addEventListener('touchend', () => {
      clearTimeout(holdTimer);
      if (!longPressing) {
        clearTimeout(resetTimer);
        resetTimer = setTimeout(doReset, 3000);
      }
    });

    document.addEventListener('touchmove', (e) => {
      clearTimeout(holdTimer);
      onPointerMove(e);
    }, { passive: true });
  }

  // --- Desktop ---
  document.addEventListener('pointermove', onPointerMove);

  // --- Init ---
  catX = window.innerWidth * 0.68 - catW/2;
  catY = window.innerHeight * 0.6 - catH/2;
  currentX = catX; currentY = catY;
  cat.style.left = catX + 'px';
  cat.style.top = catY + 'px';

  

  update();

  window.addEventListener('resize', () => {
    catX = Math.min(catX, window.innerWidth - catW - 30);
    catY = Math.min(catY, window.innerHeight - catH - 30);
    currentX = catX; currentY = catY;
  });

})();
</script>
</body>
</html>
